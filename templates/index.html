<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cough Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input[type=file] {
            margin: 20px 0;
        }
        #result {
            margin-top: 20px;
            font-size: 1.2em;
            color: #333;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Cough Detection</h1>
    <form id="uploadForm">
        <input type="file" name="audio" id="audioFile" accept=".wav,.mp3" required>
        <br>
        <button type="submit">Upload & Predict</button>
    </form>

    <div id="result"></div>

    <script>
        const form = document.getElementById('uploadForm');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('audioFile');
            if (!fileInput.files.length) {
                alert("Please select an audio file.");
                return;
            }

            const formData = new FormData();
            formData.append('audio', fileInput.files[0]);

            resultDiv.innerHTML = "Processing...";

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok) {
                    let probsHTML = '';
                    if (data.probabilities) {
                        for (const [cat, prob] of Object.entries(data.probabilities)) {
                            probsHTML += `<li>${cat}: ${(prob*100).toFixed(2)}%</li>`;
                        }
                    }
                    resultDiv.innerHTML = `
                        <strong>Prediction:</strong> ${data.label} <br>
                        <ul>${probsHTML}</ul>
                    `;
                } else {
                    resultDiv.innerHTML = `<strong>Error:</strong> ${data.error}`;
                }

            } catch (err) {
                resultDiv.innerHTML = `<strong>Error:</strong> ${err}`;
            }
        });
    </script>
</body>
</html>
